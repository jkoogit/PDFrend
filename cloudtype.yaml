applications:
  - name: pdfrend-backend-dev
    project: pdfrend
    type: nodejs
    context:
      git:
        url: https://github.com/jkoogit/PDFrend.git
        ref: dev
      root: .
    spec:
      runtime: nodejs-20
      build: npx pnpm install && npx pnpm run backend:build
      start: npx pnpm --filter backend start
      port: 4000
      env:
        - name: NODE_ENV
          value: production
        - name: ENVIRONMENT
          value: dev
        - name: PORT
          value: "4000"
