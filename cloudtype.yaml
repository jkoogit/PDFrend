applications:
  - name: pdfrend-backend-dev
    project: pdfrend
    type: nodejs
    context:
      git:
        url: https://github.com/jkoogit/PDFrend.git
        ref: dev
      root: src/backend
    spec:
      runtime: nodejs-20
      build: npm install && npm run build
      start: npm start
      port: 4000
      env:
        - name: NODE_ENV
          value: production
        - name: ENVIRONMENT
          value: dev
        - name: PORT
          value: "4000"
